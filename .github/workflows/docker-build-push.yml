name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config files from secrets
        run: |
          
          echo "${{ secrets.CONFIG_INI }}" > config.ini
          echo "${{ secrets.CONFIG_JSON }}" > config.json
          echo "${{ secrets.GELBU_JSON }}" > gelbu.json
          echo "${{ secrets.PROXYCHAINS_CONF }}" > proxychains.conf
          echo "${{ secrets.WEB_CERT }}" > server.cert
          echo "${{ secrets.WEB_KEY }}" > server.key

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bruh-bot:latest
